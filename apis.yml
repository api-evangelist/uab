apis:
  - aid: uab:ddd-oai-pmh
    name: DDD Digital Document Repository OAI-PMH
    description: >-
      OAI-PMH 2.0 metadata harvesting endpoint for the Dipòsit Digital de
      Documents de la UAB (DDD), the university's institutional repository of
      theses, articles, preprints, postprints, ebooks, periodicals, and other
      scholarly and institutional output. The repository runs on the Invenio
      platform (originally from CERN) and is certified OpenAIRE-compliant. The
      endpoint supports standard OAI-PMH verbs (Identify, ListRecords,
      ListSets, GetRecord) and is harvested by aggregators such as Google
      Scholar, BASE, and CORE.
    humanURL: https://www.uab.cat/en/libraries/digital-document-repository
    baseURL: https://ddd.uab.cat/oai2d
    tags: [ OAI-PMH, Institutional Repository, Open Access, Metadata, Invenio, Research ]
    properties:
      - type: Documentation
        url: https://www.uab.cat/en/libraries/digital-document-repository
  - aid: uab:rdr-research-data
    name: CSUC Research Data Repository (CORA RDR)
    description: >-
      UAB research data is published via the Catalan Consortium of University
      Services (CSUC) federated, multidisciplinary research data repository
      (CORA Repositori de Dades de Recerca), where Catalan universities and
      CERCA research centers publish FAIR research data sets following EOSC
      guidelines. This is a shared/federated consortium platform rather than a
      UAB-only API; no UAB-specific public API documentation was confirmed.
    humanURL: https://www.uab.cat/web/research/open-access-uab/open-access-data-1345704463199.html
    tags: [ Research Data, Open Data, FAIR, CSUC, Federated, Consortium ]
    properties:
      - type: Documentation
        url: https://www.uab.cat/web/research/open-access-uab/open-access-data-1345704463199.html
