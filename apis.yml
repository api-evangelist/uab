---
aid: uab
name: Autonomous University of Barcelona
description: >-
  The Autonomous University of Barcelona (Universitat Autònoma de Barcelona, UAB)
  is a public research university in Bellaterra, near Barcelona, Spain, founded
  in 1968 and ranked #175 in the QS World University Rankings 2025. UAB's public,
  machine-accessible footprint centers on its open scholarly infrastructure rather
  than a formal developer portal: the Dipòsit Digital de Documents (DDD), the
  institutional repository built on the Invenio platform, exposes an OAI-PMH 2.0
  metadata endpoint and is OpenAIRE-compliant. Research data is published through
  the Catalan consortium (CSUC) federated research data repository. No dedicated,
  publicly documented UAB developer/API program or official institutional GitHub
  organization was confirmed; student-facing academic services (SIA) are gated
  login portals without public API documentation.
